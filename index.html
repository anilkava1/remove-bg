<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Background Remover | HD</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><span>remove<span>bg</span></span></div>
            <div class="nav-links">
                <a href="javascript:void(0)" onclick="alert('Contact for API: anilkava263@gmail.com')" class="api-link">API</a>
            </div>
        </div>
    </nav>

    <div class="ad-responsive">ADVERTISEMENT</div>

    <main class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <div class="animation-box">
                    <div class="bg-layer"></div>
                    <div class="subject-layer"></div>
                    <div class="scanner"></div>
                </div>
                <div class="text-content">
                    <h1>Remove Image <br>Background</h1>
                    <p>100% Automatically and <span>Free</span></p>
                </div>
            </div>

            <div class="hero-actions">
                <div class="upload-card">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div class="upload-inner" onclick="document.getElementById('imageInput').click()">
                        <div class="blue-btn">Upload Image</div>
                        <p>or drop a file</p>
                    </div>
                </div>
                
                <div id="resultArea" class="result-box" style="display:none;">
                    <div id="processingTimer" class="timer-container">
                        <div class="spinner"></div>
                        <p>Generating PNG in <span id="timerText">5</span>s...</p>
                    </div>
                    
                    <div id="finalContent" style="display: none;">
                        <div class="result-preview">
                            <img id="resultImg" src="" alt="Result">
                        </div>
                        <button id="dlFree" class="dl-btn">DOWNLOAD HD IMAGE OF PNG</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="ad-responsive">ADVERTISEMENT</div>

    <footer class="footer">
        <h3>AK Background Tool with HD image</h3>
        <p>© 2026 Anil Kava | anilkava263@gmail.com</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
