<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Background - 100% Automatically and Free</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logo.png" alt="AK Logo" onerror="this.style.display='none'">
                <span>remove<span>bg</span></span>
            </div>
            <ul class="nav-links">
                <li><a href="#">Uploads</a></li>
                <li><a href="mailto:anilkava263@gmail.com" class="api-link">API (Contact for API)</a></li>
                <li><a href="#">Pricing</a></li>
            </ul>
            <div class="nav-auth">
                <a href="#" class="login">Log in</a>
                <a href="#" class="signup">Sign up</a>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-container">
            <div class="hero-left">
                <div class="animation-container">
                    <div class="bg-scene"></div>
                    <div class="subject-man"></div>
                </div>
                <h1>Remove Image <br>Background</h1>
                <p>100% Automatically and <span>Free</span></p>
            </div>

            <div class="hero-right">
                <div class="upload-card">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div class="upload-inner" onclick="document.getElementById('imageInput').click()">
                        <button class="blue-btn">Upload Image</button>
                        <p class="drop-text">or drop a file,</p>
                        <p class="small-text">paste image or <u>URL</u></p>
                    </div>
                </div>
                
                <div id="resultArea" class="result-box" style="display:none;">
                    <div class="result-preview">
                        <img id="resultImg" src="" alt="Result">
                    </div>
                    <div class="action-btns">
                        <button id="dlFree" class="dl-btn">Download</button>
                        <button class="dl-btn hd">Download HD</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="ad-banner bottom-ad">ADVERTISEMENT</div>

    <footer>
        <p>AK Background Tool with HD image | © 2026 Anil Kava</p>
    </footer>

    <div id="adOverlay" class="overlay" style="display:none;">
        <div class="ad-card">
            <h3>Processing AI...</h3>
            <p>Wait <span id="countdown">5</span> seconds</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
